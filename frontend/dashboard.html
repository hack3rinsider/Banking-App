<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NovaBank</title>
<link rel="stylesheet" href="dashboard.css">
<script src="api.js"></script>
</head>
<body>

<div class="sidebar">
<div class="brand">NovaBank</div>
<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="transfer.html">Transfer</a>
<a href="profile.html">Profile</a>
<a href="#" onclick="logout();return false;">Logout</a>
</div>
</div>

<div class="main">
<div class="hero">
<h3>Available Balance</h3>
<h1 id="balance">₹0</h1>
</div>

<div class="cards">
<div class="card">
<h3>Customer</h3>
<h2 id="name">Loading...</h2>
</div>

<div class="card">
<h3>Account</h3>
<h2 id="account">Loading...</h2>
</div>
</div>

<div class="table-card">
<h2>Recent Activity</h2>
<table id="txTable">
<tr>
<th>Type</th>
<th>Sender</th>
<th>Receiver</th>
<th>Amount</th>
</tr>
</table>
</div>

<div id="adminArea"></div>

</div>

<script>
window.addEventListener('DOMContentLoaded', async ()=>{

 const token=getToken();

 if(!token){
  logout();
  return;
 }

 const me=await fetch(API+"/me",{
  headers:{Authorization:`Bearer ${token}`}
 });

 const user=await me.json();

 document.getElementById("name").innerText=user.full_name;
 account.innerText=user.account_number;
 balance.innerText="₹"+user.balance;

 const tx=await fetch(API+"/my-transactions",{
  headers:{Authorization:`Bearer ${token}`}
 });

 const rows=await tx.json();

 rows.forEach(t=>{
  txTable.innerHTML+=`
  <tr>
   <td>${t.type}</td>
   <td>${t.sender_account}</td>
   <td>${t.receiver_account}</td>
   <td>₹${t.amount}</td>
  </tr>`;
 });

 const usersRes=await fetch(API+"/admin/users",{
  headers:{Authorization:`Bearer ${token}`}
 });

 if(usersRes.ok){

  const users=await usersRes.json();

  let html=`
  <div class="table-card">
  <h2>All Customers</h2>
  <table>
  <tr>
  <th>Name</th>
  <th>Email</th>
  <th>Account</th>
  <th>Balance</th>
  <th>Role</th>
  </tr>`;

  users.forEach(u=>{
   html+=`
   <tr>
    <td>${u.full_name}</td>
    <td>${u.email}</td>
    <td>${u.account_number||'-'}</td>
    <td>₹${u.balance}</td>
    <td>${u.role}</td>
   </tr>`;
  });

  html+=`</table></div>`;

  const txAll=await fetch(API+"/transactions");
  const allRows=await txAll.json();

  html+=`
  <div class="table-card">
  <h2>All Transactions</h2>
  <table>
  <tr>
  <th>ID</th>
  <th>Sender</th>
  <th>Receiver</th>
  <th>Amount</th>
  </tr>`;

  allRows.forEach(t=>{
   html+=`
   <tr>
    <td>${t.id}</td>
    <td>${t.sender_account}</td>
    <td>${t.receiver_account}</td>
    <td>₹${t.amount}</td>
   </tr>`;
  });

  html+=`</table></div>`;

  adminArea.innerHTML=html;
 }

});
</script>

</body>
</html>
