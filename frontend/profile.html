<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NovaBank Profile</title>
<link rel="stylesheet" href="dashboard.css">
<script src="api.js"></script>
</head>
<body>

<div class="sidebar">
<div class="brand">NovaBank</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="transfer.html">Transfer</a>
<a href="deposit.html">Add Money</a>
<a href="profile.html">Profile</a>
<a href="#" onclick="logout();return false;">Logout</a>
</div>
</div>

<div class="main">

<div class="hero">
<h3>Customer Profile</h3>
<h1 id="name">Loading...</h1>
</div>

<div class="cards">

<div class="card">
<h3>Email</h3>
<h2 id="email">Loading...</h2>
</div>

<div class="card">
<h3>Account Number</h3>
<h2 id="account">Loading...</h2>
</div>

<div class="card">
<h3>Balance</h3>
<h2 id="balance">₹0</h2>
</div>

</div>

</div>

<script>

async function loadProfile(){

 const token=getToken();

 if(!token){
  logout();
  return;
 }

 try{

  const res=await fetch(API+'/me',{
   headers:{
    Authorization:`Bearer ${token}`
   }
  });

  if(!res.ok){
   logout();
   return;
  }

  const user=await res.json();

  document.getElementById('name').innerText=user.full_name;
  document.getElementById('email').innerText=user.email;
  document.getElementById('account').innerText=user.account_number;
  document.getElementById('balance').innerText='₹'+user.balance;

 }catch(err){
  console.error(err);
 }

}

loadProfile();

</script>

</body>
</html>
