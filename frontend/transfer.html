<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>NovaBank Transfer</title>
<link rel="stylesheet" href="dashboard.css">
<script src="api.js"></script>
</head>

<body>

<div class="sidebar">

<div class="brand">NovaBank</div>

<div class="menu">
<a href="dashboard.html">Dashboard</a>
<a href="transfer.html">Transfer</a>
<a href="deposit.html">Add Money</a>
<a href="profile.html">Profile</a>
<a href="#" onclick="logout(); return false;">Logout</a>
</div>

</div>

<div class="main">

<div class="hero">
<h3>Money Transfer</h3>
<h1>Send Funds</h1>
</div>

<div class="card">

<label>From Account</label>
<input id="sender" readonly>

<label>To Account</label>
<input id="receiver" placeholder="Account Number">

<label>Amount</label>
<input id="amount" type="number" placeholder="Amount">

<button onclick="transferMoney()">
Transfer Funds
</button>

<br><br>

<div id="status"></div>

</div>

</div>

<script>

function parseJwt(token){

 return JSON.parse(atob(token.split('.')[1]));

}

let account='';

async function init(){

 const token=localStorage.getItem('token');

 if(!token){

  location.href='login.html';
  return;

 }

 const user=parseJwt(token);

 account=user.account_number;

 document.getElementById('sender').value=account;

}

async function transferMoney(){

 const receiver=document.getElementById('receiver').value;
 const amount=Number(document.getElementById('amount').value);

 if(!amount || amount<=0){

  alert('Enter valid amount');
  return;

 }

 const res=await fetch('/api/transfer',{

  method:'POST',

  headers:{
   'Content-Type':'application/json'
  },

  body:JSON.stringify({
   sender:account,
   receiver,
   amount
  })

 });

 const data=await res.json();

 document.getElementById('status').innerHTML=
  data.message || data.error;

 if(res.ok){

  setTimeout(()=>{
   location.href='dashboard.html';
  },1000);

 }

}

window.logout=function(){

 localStorage.removeItem('token');
 localStorage.removeItem('user');

 location.href='login.html';

}

init();

</script>

</body>
</html>
